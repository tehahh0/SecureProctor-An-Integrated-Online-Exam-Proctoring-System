<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – OEPS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<div class="login-page">
  <div class="login-box">

    <div class="login-logo">
      <div class="login-icon">📝</div>
      <h1>Create Account</h1>
      <p>SecureProctor Student Registration</p>
    </div>

    <div class="card">
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-control" name="full_name" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" placeholder="Choose a password" required />
        </div>
        <button class="btn btn-primary btn-full btn-lg">Register</button>
      </form>
    </div>

    <p class="register-link">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>

  </div>
</div>

</body>
</html>
