{% extends "base.html" %}
{% block title %}New Exam – OEPS{% endblock %}

{% block content %}
<div class="container" style="margin-top: 2rem;">

  <div class="actions-bar">
    <div class="page-header" style="margin-bottom: 0;">
      <h1>Create New Exam</h1>
    </div>
    <a href="{{ url_for('admin_exams') }}" class="btn btn-ghost">← Back</a>
  </div>

  <div class="card" style="max-width: 600px;">
    <form method="POST" action="{{ url_for('new_exam') }}">

      <div class="form-group">
        <label class="form-label">Exam Title</label>
        <input class="form-control" name="title" placeholder="e.g. Python Fundamentals Quiz" required />
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" placeholder="Brief description of this exam"></textarea>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Duration (minutes)</label>
          <input class="form-control" type="number" name="duration" value="60" min="5" required />
        </div>
        <div class="form-group">
          <label class="form-label">Max Violations Before Termination</label>
          <input class="form-control" type="number" name="max_violations" value="3" min="1" max="10" />
        </div>
      </div>

      <button class="btn btn-primary btn-lg">Create Exam →</button>

    </form>
  </div>

</div>
{% endblock %}
